app:
  name: ARECCA
  version: 0.1.0

llm:
  provider: huggingface
  model: AdaptLLM/law-llm-7b
  device: auto
  load_in_8bit: true
  temperature: 0.0
  max_tokens: 4096

gemini:
  model: gemini-2.0-flash
  temperature: 0.0
  max_tokens: 4096

embedding:
  provider: huggingface
  model: nlpaueb/legal-bert-base-uncased
  dimensions: 768

retrieval:
  top_k: 5
  similarity_cutoff: 0.7
  hybrid_search: true
  alpha: 0.3

chunking:
  chunk_size: 1024
  chunk_overlap: 128
  strategy: semantic
  semantic_buffer_size: 3
  semantic_breakpoint_percentile: 85

extraction:
  target_model: AdaptLLM/law-llm-7b
  fallback_model: AdaptLLM/law-llm-7b

validation:
  rounding_decimals: 2
  tolerance: 0.01

compliance:
  jurisdiction: california
  enable_state_laws: true
  enable_federal_laws: true

storage:
  backend: local
  allowed_extensions:
    - .pdf
    - .tiff
    - .png
  max_file_size_mb: 50

prompts:
  version: v1
  hot_reload: false

memory:
  encryption_key: ""
  data_dir: data/memory

tracing:
  langsmith_project: arecca

context:
  target_context_tokens: 8000

graph:
  max_iterations: 8
  checkpointer: sqlite 
  
